kind: integration
name: Chainalysis
version: 0.1.0
repo: w3-io/w3-chainalysis-action
partner: chainalysis
description: >
  Chainalysis provides blockchain compliance and sanctions screening.
  Real-time address screening against OFAC, EU, and UN sanctions lists.
  Includes KYT (Know Your Transaction) risk scoring and entity
  identification for comprehensive compliance workflows.
context: >
  Use for compliance checks before sending funds or sanctions screening of
  counterparty addresses. Not for general blockchain data — use SxT or
  Chainlink for that. Cost is per-screening API call (free tier: 5000
  req/5 min). Screening is read-only and non-destructive. Requires a
  Chainalysis API key.

commands:
  - name: screen
    description: Screen address against OFAC sanctions list.
    inputs:
      address:
        type: string
        required: true
        description: Blockchain address to check
    outputs:
      result:
        type: object
        description: Screening result with sanctioned status and any designations
