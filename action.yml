name: "W3 Chainalysis Action"
description: "Chainalysis sanctions screening and compliance checks for blockchain addresses"
author: "w3-io"

inputs:
  command:
    description: "Operation: screen (sanctions check). More commands coming for enterprise API."
    required: true
    default: "screen"
  address:
    description: "Blockchain address to check"
    required: true
  api-key:
    description: "Chainalysis API key"
    required: true

outputs:
  result:
    description: "JSON result from Chainalysis API. Includes isSanctioned (boolean) and identifications (array of sanctions designations). Use fromJSON(steps.<id>.outputs.result).isSanctioned etc. to access individual fields."

runs:
  using: "node24"
  main: "dist/index.js"
